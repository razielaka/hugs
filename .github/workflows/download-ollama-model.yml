name: Pull Ollama Model and Zip with Password

on:
  workflow_dispatch:
    inputs:
      model_name:
        description: 'Ollama Model Name (e.g., llama2, mistral, codellama)'
        required: true
        default: 'llama2'
        type: string
      password:
        description: 'ZIP Password'
        required: true
        type: string
      part_size_mb:
        description: 'Part size in MB'
        required: false
        default: '45'
        type: string

jobs:
  pull-and-zip:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y zip bc jq tree
      
      - name: Install Ollama
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
      
      - name: Start Ollama service
        run: |
          ollama serve &
          sleep 10
          # Wait for Ollama to be ready
          for i in {1..30}; do
            if curl -s http://localhost:11434/api/tags > /dev/null; then
              echo "Ollama is ready"
              break
            fi
            echo "Waiting for Ollama to be ready... ($i/30)"
            sleep 2
          done
      
      - name: Pull Ollama model
        run: |
          echo "Pulling model: ${{ github.event.inputs.model_name }}"
          ollama pull ${{ github.event.inputs.model_name }}
          echo "Model pull completed"
      
      - name: Locate and prepare model files
        id: prepare
        run: |
          # Find Ollama models directory
          OLLAMA_HOME="${HOME}/.ollama"
          if [ ! -d "$OLLAMA_HOME" ]; then
            OLLAMA_HOME="/usr/share/ollama/.ollama"
          fi
          
          echo "Ollama home: $OLLAMA_HOME"
          
          # Create safe model name for filename (replace / and : with _)
          SAFE_NAME=$(echo "${{ github.event.inputs.model_name }}" | sed 's/[\/:]/_/g')
          echo "safe_name=$SAFE_NAME" >> $GITHUB_OUTPUT
          
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          ARCHIVE_NAME="ollama_${SAFE_NAME}_${TIMESTAMP}"
          echo "archive_name=$ARCHIVE_NAME" >> $GITHUB_OUTPUT
          
          # Create model_data directory
          mkdir -p model_data
          
          # Copy the entire models directory structure
          if [ -d "$OLLAMA_HOME/models" ]; then
            cp -r "$OLLAMA_HOME/models" model_data/
            echo "Copied models directory"
          else
            echo "ERROR: models directory not found at $OLLAMA_HOME/models"
            ls -la $OLLAMA_HOME/
            exit 1
          fi
          
          # Also copy blobs if they exist separately
          if [ -d "$OLLAMA_HOME/blobs" ]; then
            cp -r "$OLLAMA_HOME/blobs" model_data/
            echo "Copied blobs directory"
          fi
          
          # Show what we have
          echo "Contents of model_data:"
          ls -la model_data/
          
          if [ -d "model_data/models" ]; then
            echo "Models directory contents:"
            ls -la model_data/models/
            
            # Show manifests
            if [ -d "model_data/models/manifests" ]; then
              echo "Manifests:"
              find model_data/models/manifests -type f
            fi
            
            # Show blobs
            if [ -d "model_data/models/blobs" ]; then
              BLOB_COUNT=$(find model_data/models/blobs -type f | wc -l)
              echo "Found $BLOB_COUNT blob files"
            fi
          fi
          
          # Verify we have files to zip
          if [ $(find model_data -type f | wc -l) -eq 0 ]; then
            echo "ERROR: No files found in model_data"
            exit 1
          fi
      
      - name: Create ZIP archive with password
        run: |
          ARCHIVE_NAME="${{ steps.prepare.outputs.archive_name }}"
          
          echo "Creating zip archive from model_data directory..."
          cd model_data
          
          # Check if there are files to zip
          if [ $(find . -type f | wc -l) -eq 0 ]; then
            echo "ERROR: No files to zip"
            exit 1
          fi
          
          # Create the zip archive with all files
          zip -r -s ${{ github.event.inputs.part_size_mb }}m \
            -P "${{ github.event.inputs.password }}" \
            "../${ARCHIVE_NAME}.zip" .
          
          if [ $? -eq 0 ]; then
            echo "ZIP created successfully"
          else
            echo "ZIP creation failed"
            exit 1
          fi
          
          cd ..
          
          # List created files
          echo "Created archive parts:"
          ls -lh ${ARCHIVE_NAME}.zip* 2>/dev/null || echo "No archive parts found"
      
      - name: Create downloads directory
        run: |
          ARCHIVE_NAME="${{ steps.prepare.outputs.archive_name }}"
          mkdir -p downloads/${ARCHIVE_NAME}
      
      - name: Move and push ZIP parts incrementally
        run: |
          ARCHIVE_NAME="${{ steps.prepare.outputs.archive_name }}"
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Count files to push
          FILE_COUNT=$(ls ${ARCHIVE_NAME}.zip* 2>/dev/null | wc -l)
          echo "Found $FILE_COUNT parts to push"
          
          if [ $FILE_COUNT -eq 0 ]; then
            echo "ERROR: No archive parts found to push"
            exit 1
          fi
          
          # Push each part individually to avoid timeout
          COUNTER=0
          for file in ${ARCHIVE_NAME}.zip ${ARCHIVE_NAME}.z*; do
            if [ -f "$file" ]; then
              COUNTER=$((COUNTER + 1))
              echo "Moving and pushing part $COUNTER: $file"
              mv "$file" downloads/${ARCHIVE_NAME}/
              git add downloads/${ARCHIVE_NAME}/$(basename "$file")
              git commit -m "Add part $COUNTER/$(ls ${ARCHIVE_NAME}.zip* 2>/dev/null | wc -l) for ${ARCHIVE_NAME}"
              git push
              sleep 2
            fi
          done
      
      - name: Get model information
        id: model_info
        run: |
          # Get model details
          MODEL_NAME="${{ github.event.inputs.model_name }}"
          
          # Try to get modelfile
          MODELFILE=$(ollama show $MODEL_NAME --modelfile 2>/dev/null || echo "Not available")
          
          # Get model size from actual files
          if [ -d "model_data" ]; then
            MODEL_SIZE=$(du -sh model_data 2>/dev/null | cut -f1 || echo "Unknown")
          else
            MODEL_SIZE="Unknown"
          fi
          
          echo "model_size=$MODEL_SIZE" >> $GITHUB_OUTPUT
          
          # Save modelfile for later
          echo "$MODELFILE" > modelfile.txt
      
      - name: Create documentation and finalize
        run: |
          ARCHIVE_NAME="${{ steps.prepare.outputs.archive_name }}"
          SAFE_NAME="${{ steps.prepare.outputs.safe_name }}"
          
          # Count parts
          PART_COUNT=$(ls downloads/${ARCHIVE_NAME}/*.zip downloads/${ARCHIVE_NAME}/*.z* 2>/dev/null | wc -l)
          
          cat > downloads/${ARCHIVE_NAME}/INFO.txt << 'EOF'
          Ollama Model Archive
          ====================
          
          Original Model: ${{ github.event.inputs.model_name }}
          Safe Filename: ${{ steps.prepare.outputs.safe_name }}
          Date: $(date -u '+%Y-%m-%d %H:%M:%S UTC')
          Archive Name: ${{ steps.prepare.outputs.archive_name }}
          Total Parts: $PART_COUNT
          Model Size: ${{ steps.model_info.outputs.model_size }}
          
          This archive is password protected.
          
          Model File Contents:
          ${{ steps.model_info.outputs.modelfile }}
          
          Restoration Instructions:
          =========================
          
          1. Download all parts to a directory
          2. Combine parts if needed:
             cat ${ARCHIVE_NAME}.zip* > combined.zip
             
          3. Extract with password:
             unzip -P "PASSWORD_HERE" combined.zip -d ~/.ollama/
             
             Or extract each part:
             unzip -P "PASSWORD_HERE" ${ARCHIVE_NAME}.zip -d ~/.ollama/
             
          4. Verify the model:
             ollama list
             
          5. Run the model:
             ollama run ${{ github.event.inputs.model_name }}
          
          Note: Replace PASSWORD_HERE with the password used when creating this archive.
          EOF
          
          # Update README
          if [ ! -f README.md ]; then
            echo "# Ollama Models Repository" > README.md
            echo "" >> README.md
            echo "This repository contains password-protected archives of Ollama models." >> README.md
            echo "" >> README.md
            echo "## Available Models" >> README.md
            echo "" >> README.md
          fi
          
          # Check if model already exists in README
          if ! grep -q "${{ github.event.inputs.model_name }}" README.md; then
            echo "### ${{ github.event.inputs.model_name }}" >> README.md
            echo "- **Archive**: [downloads/${ARCHIVE_NAME}/](downloads/${ARCHIVE_NAME}/)" >> README.md
            echo "- **Date**: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> README.md
            echo "- **Size**: ${{ steps.model_info.outputs.model_size }}" >> README.md
            echo "- **Parts**: $PART_COUNT" >> README.md
            echo "" >> README.md
          fi
          
          git add downloads/${ARCHIVE_NAME}/INFO.txt README.md
          
          # Also add the modelfile if available
          if [ -f modelfile.txt ] && [ -s modelfile.txt ]; then
            cp modelfile.txt downloads/${ARCHIVE_NAME}/modelfile.txt
            git add downloads/${ARCHIVE_NAME}/modelfile.txt
          fi
          
          git commit -m "Finalize ${ARCHIVE_NAME} - Ollama model ${{ github.event.inputs.model_name }}"
          git push
      
      - name: Clean up
        if: always()
        run: |
          # Remove the pulled model to free space
          ollama rm ${{ github.event.inputs.model_name }} || true
          rm -rf model_data
          rm -f modelfile.txt
      
      - name: Summary
        run: |
          PART_COUNT=$(ls downloads/${{ steps.prepare.outputs.archive_name }}/*.zip downloads/${{ steps.prepare.outputs.archive_name }}/*.z* 2>/dev/null | wc -l)
          
          echo "## ✅ Ollama Model Successfully Archived" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Model** | ${{ github.event.inputs.model_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Archive Name** | ${{ steps.prepare.outputs.archive_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Location** | \`downloads/${{ steps.prepare.outputs.archive_name }}/\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Total Parts** | $PART_COUNT |" >> $GITHUB_STEP_SUMMARY
          echo "| **Model Size** | ${{ steps.model_info.outputs.model_size }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "### How to Restore" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo "# Download all parts" >> $GITHUB_STEP_SUMMARY
          echo "# Extract to Ollama directory" >> $GITHUB_STEP_SUMMARY
          echo "unzip -P \"YOUR_PASSWORD\" downloads/${{ steps.prepare.outputs.archive_name }}/*.zip -d ~/.ollama/" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "# Verify the model" >> $GITHUB_STEP_SUMMARY
          echo "ollama list" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
