name: Pull Ollama Model and Zip with Password

on:
  workflow_dispatch:
    inputs:
      model_name:
        description: 'Ollama Model Name (e.g., llama2, mistral, codellama)'
        required: true
        default: 'llama2'
        type: string
      password:
        description: 'ZIP Password'
        required: true
        type: string
      part_size_mb:
        description: 'Part size in MB'
        required: false
        default: '45'
        type: string

jobs:
  pull-and-zip:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y zip bc jq tree
      
      - name: Install Ollama
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
      
      - name: Start Ollama service
        run: |
          ollama serve &
          sleep 10
          # Wait for Ollama to be ready
          for i in {1..30}; do
            if curl -s http://localhost:11434/api/tags > /dev/null; then
              echo "Ollama is ready"
              break
            fi
            echo "Waiting for Ollama to be ready... ($i/30)"
            sleep 2
          done
      
      - name: Pull Ollama model
        run: |
          echo "Pulling model: ${{ github.event.inputs.model_name }}"
          ollama pull ${{ github.event.inputs.model_name }}
          echo "Model pull completed"
      
      - name: Debug - Find Ollama installation
        run: |
          echo "=== Finding Ollama installation ==="
          which ollama
          ollama --version
          
          echo "=== Ollama environment ==="
          env | grep -i ollama || echo "No OLLAMA env vars"
          
          echo "=== Home directory contents ==="
          ls -la ~/
          
          echo "=== Looking for .ollama directory ==="
          find ~ -name ".ollama" -type d 2>/dev/null || echo "No .ollama found in home"
          
          echo "=== Looking for ollama directories ==="
          sudo find / -name "ollama" -type d 2>/dev/null | head -20
          
          echo "=== Check running processes ==="
          ps aux | grep ollama
      
      - name: Debug - Find models after pull
        run: |
          echo "=== Ollama model list ==="
          ollama list
          
          echo "=== Checking common Ollama paths ==="
          PATHS_TO_CHECK=(
            "$HOME/.ollama"
            "/root/.ollama"
            "/usr/share/ollama/.ollama"
            "/var/lib/ollama"
            "/tmp/ollama"
          )
          
          for path in "${PATHS_TO_CHECK[@]}"; do
            if [ -d "$path" ]; then
              echo "Found: $path"
              ls -la "$path"
              if [ -d "$path/models" ]; then
                echo "  - models directory exists"
                ls -la "$path/models"
              fi
            fi
          done
          
          echo "=== Full system search for blobs ==="
          sudo find / -name "blobs" -type d 2>/dev/null | grep -v "^/proc" | grep -v "^/sys" | head -10
      
      - name: Locate and prepare model files
        id: prepare
        run: |
          set -x  # Enable debug output
          
          # Try multiple possible Ollama paths
          OLLAMA_HOME=""
          POSSIBLE_PATHS=(
            "$HOME/.ollama"
            "/root/.ollama"
            "/usr/share/ollama/.ollama"
            "/var/lib/ollama"
          )
          
          for path in "${POSSIBLE_PATHS[@]}"; do
            if [ -d "$path" ] && [ -d "$path/models" ]; then
              OLLAMA_HOME="$path"
              echo "Found Ollama at: $OLLAMA_HOME"
              break
            fi
          done
          
          if [ -z "$OLLAMA_HOME" ]; then
            echo "ERROR: Could not find Ollama models directory"
            echo "Tried paths: ${POSSIBLE_PATHS[@]}"
            echo "Current user: $(whoami)"
            echo "Home: $HOME"
            echo "Full find for .ollama:"
            find /home -name ".ollama" -type d 2>/dev/null
            exit 1
          fi
          
          echo "ollama_home=$OLLAMA_HOME" >> $GITHUB_OUTPUT
          
          # Create safe model name
          SAFE_NAME=$(echo "${{ github.event.inputs.model_name }}" | sed 's/[\/:]/_/g')
          echo "safe_name=$SAFE_NAME" >> $GITHUB_OUTPUT
          
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          ARCHIVE_NAME="ollama_${SAFE_NAME}_${TIMESTAMP}"
          echo "archive_name=$ARCHIVE_NAME" >> $GITHUB_OUTPUT
          
          # Create model_data directory
          mkdir -p model_data
          
          # Copy models directory
          echo "Copying from $OLLAMA_HOME/models to model_data/models"
          cp -r "$OLLAMA_HOME/models" model_data/
          
          # Also check for blobs directory at root level
          if [ -d "$OLLAMA_HOME/blobs" ]; then
            echo "Copying blobs from $OLLAMA_HOME/blobs"
            cp -r "$OLLAMA_HOME/blobs" model_data/
          fi
          
          # Show what we have
          echo "=== model_data contents ==="
          ls -la model_data/
          
          echo "=== model_data/models contents ==="
          if [ -d "model_data/models" ]; then
            ls -la model_data/models/
            
            echo "=== manifests ==="
            if [ -d "model_data/models/manifests" ]; then
              find model_data/models/manifests -type f -exec ls -lh {} \;
            else
              echo "No manifests directory found"
            fi
            
            echo "=== blobs ==="
            if [ -d "model_data/models/blobs" ]; then
              BLOB_COUNT=$(find model_data/models/blobs -type f | wc -l)
              echo "Found $BLOB_COUNT blob files"
              if [ $BLOB_COUNT -gt 0 ]; then
                ls -lh model_data/models/blobs/ | head -20
              fi
            else
              echo "No blobs directory found under models"
            fi
          else
            echo "model_data/models does not exist!"
          fi
          
          # Verify we have files
          FILE_COUNT=$(find model_data -type f 2>/dev/null | wc -l)
          echo "Total files to archive: $FILE_COUNT"
          
          if [ $FILE_COUNT -eq 0 ]; then
            echo "ERROR: No files found in model_data"
            echo "Trying to find actual blob locations..."
            
            # Try to find where Ollama actually stores blobs
            echo "Checking process for Ollama storage location:"
            ps aux | grep ollama
            
            # Try to get info from ollama show command
            echo "Model info from ollama:"
            ollama show ${{ github.event.inputs.model_name }} 2>&1 || echo "Cannot show model info"
            
            exit 1
          fi
          
          set +x  # Disable debug output
      
      - name: Create ZIP archive with password
        if: steps.prepare.outcome == 'success'
        run: |
          ARCHIVE_NAME="${{ steps.prepare.outputs.archive_name }}"
          
          echo "Creating zip archive from model_data directory..."
          cd model_data
          
          # Show current directory contents
          echo "Current directory: $(pwd)"
          echo "Files to zip:"
          find . -type f | head -20
          
          # Create the zip archive
          zip -r -s ${{ github.event.inputs.part_size_mb }}m \
            -P "${{ github.event.inputs.password }}" \
            "../${ARCHIVE_NAME}.zip" .
          
          ZIP_EXIT=$?
          cd ..
          
          if [ $ZIP_EXIT -eq 0 ]; then
            echo "ZIP created successfully"
            echo "Created files:"
            ls -lh ${ARCHIVE_NAME}.zip* 2>/dev/null
          else
            echo "ZIP creation failed with exit code: $ZIP_EXIT"
            exit 1
          fi
      
      - name: Create downloads directory
        if: steps.prepare.outcome == 'success'
        run: |
          ARCHIVE_NAME="${{ steps.prepare.outputs.archive_name }}"
          mkdir -p downloads/${ARCHIVE_NAME}
      
      - name: Move and push ZIP parts
        if: steps.prepare.outcome == 'success'
        run: |
          ARCHIVE_NAME="${{ steps.prepare.outputs.archive_name }}"
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          FILE_COUNT=$(ls ${ARCHIVE_NAME}.zip* 2>/dev/null | wc -l)
          echo "Found $FILE_COUNT parts to push"
          
          if [ $FILE_COUNT -eq 0 ]; then
            echo "ERROR: No archive parts found"
            exit 1
          fi
          
          COUNTER=0
          for file in ${ARCHIVE_NAME}.zip ${ARCHIVE_NAME}.z*; do
            if [ -f "$file" ]; then
              COUNTER=$((COUNTER + 1))
              echo "Moving and pushing part $COUNTER/$FILE_COUNT: $file"
              mv "$file" downloads/${ARCHIVE_NAME}/
              git add downloads/${ARCHIVE_NAME}/$(basename "$file")
              git commit -m "Add part $COUNTER/$FILE_COUNT for ${ARCHIVE_NAME}"
              git push
              sleep 2
            fi
          done
      
      - name: Create documentation
        if: steps.prepare.outcome == 'success'
        run: |
          ARCHIVE_NAME="${{ steps.prepare.outputs.archive_name }}"
          
          PART_COUNT=$(ls downloads/${ARCHIVE_NAME}/*.zip downloads/${ARCHIVE_NAME}/*.z* 2>/dev/null | wc -l)
          
          cat > downloads/${ARCHIVE_NAME}/INFO.txt << EOF
          Ollama Model Archive
          ====================
          
          Original Model: ${{ github.event.inputs.model_name }}
          Safe Filename: ${{ steps.prepare.outputs.safe_name }}
          Date: $(date -u '+%Y-%m-%d %H:%M:%S UTC')
          Archive Name: ${{ steps.prepare.outputs.archive_name }}
          Total Parts: $PART_COUNT
          
          Restoration Instructions:
          =========================
          
          1. Download all parts to a directory
          2. Extract with password:
             unzip -P "${{ github.event.inputs.password }}" ${ARCHIVE_NAME}.zip -d ~/.ollama/
             
          3. Verify the model:
             ollama list
             
          4. Run the model:
             ollama run ${{ github.event.inputs.model_name }}
          EOF
          
          if [ ! -f README.md ]; then
            echo "# Ollama Models Repository" > README.md
            echo "" >> README.md
          fi
          
          echo "### ${{ github.event.inputs.model_name }}" >> README.md
          echo "- **Archive**: [downloads/${ARCHIVE_NAME}/](downloads/${ARCHIVE_NAME}/)" >> README.md
          echo "- **Date**: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> README.md
          echo "- **Parts**: $PART_COUNT" >> README.md
          echo "" >> README.md
          
          git add downloads/${ARCHIVE_NAME}/INFO.txt README.md
          git commit -m "Finalize ${ARCHIVE_NAME} - Ollama model ${{ github.event.inputs.model_name }}"
          git push
      
      - name: Clean up
        if: always()
        run: |
          ollama rm ${{ github.event.inputs.model_name }} || true
          rm -rf model_data
      
      - name: Summary
        if: success()
        run: |
          echo "## ✅ Workflow Completed" >> $GITHUB_STEP_SUMMARY
          echo "- Model: ${{ github.event.inputs.model_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- Archive: \`downloads/${{ steps.prepare.outputs.archive_name }}/\`" >> $GITHUB_STEP_SUMMARY
