name: Pull Ollama Model and Zip with Password

on:
  workflow_dispatch:
    inputs:
      model_name:
        description: 'Ollama Model Name (e.g., llama2, mistral, codellama)'
        required: true
        default: 'llama2'
        type: string
      password:
        description: 'ZIP Password'
        required: true
        type: string
      part_size_mb:
        description: 'Part size in MB'
        required: false
        default: '45'
        type: string

jobs:
  pull-and-zip:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y zip bc jq
      
      - name: Install Ollama
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
      
      - name: Start Ollama service
        run: |
          ollama serve &
          sleep 5
          # Wait for Ollama to be ready
          until curl -s http://localhost:11434/api/tags > /dev/null; do
            echo "Waiting for Ollama to be ready..."
            sleep 2
          done
      
      - name: Pull Ollama model
        run: |
          echo "Pulling model: ${{ github.event.inputs.model_name }}"
          ollama pull ${{ github.event.inputs.model_name }}
          echo "Model pull completed"
      
      - name: Locate Ollama models directory
        id: locate_models
        run: |
          # Find Ollama models directory (typically ~/.ollama/models)
          OLLAMA_HOME="${HOME}/.ollama"
          if [ ! -d "$OLLAMA_HOME" ]; then
            OLLAMA_HOME="/usr/share/ollama/.ollama"
          fi
          
          if [ ! -d "$OLLAMA_HOME" ]; then
            echo "Could not find Ollama models directory"
            exit 1
          fi
          
          echo "ollama_home=$OLLAMA_HOME" >> $GITHUB_OUTPUT
          echo "Found Ollama models at: $OLLAMA_HOME"
      
      - name: Get model manifests and blobs
        run: |
          OLLAMA_HOME="${{ steps.locate_models.outputs.ollama_home }}"
          MODELS_DIR="${OLLAMA_HOME}/models"
          MANIFESTS_DIR="${MODELS_DIR}/manifests"
          BLOBS_DIR="${MODELS_DIR}/blobs"
          
          # Create temporary directory for model data
          mkdir -p model_data
          
          # Copy manifest directory structure
          if [ -d "$MANIFESTS_DIR" ]; then
            cp -r "$MANIFESTS_DIR" model_data/
            echo "Copied manifests directory"
          fi
          
          # Copy blobs directory structure
          if [ -d "$BLOBS_DIR" ]; then
            cp -r "$BLOBS_DIR" model_data/
            echo "Copied blobs directory"
          fi
          
          # Optionally, copy only blobs related to the specific model
          # This requires parsing the manifest files
          echo "Model data prepared in model_data/"
      
      - name: Create ZIP archive with password
        id: zip
        run: |
          MODEL_NAME="${{ github.event.inputs.model_name }}"
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          ARCHIVE_NAME="ollama_${MODEL_NAME}_${TIMESTAMP}"
          
          cd model_data
          zip -r -s ${{ github.event.inputs.part_size_mb }}m \
            -P "${{ github.event.inputs.password }}" \
            "../${ARCHIVE_NAME}.zip" .
          cd ..
          
          echo "archive_name=$ARCHIVE_NAME" >> $GITHUB_OUTPUT
          echo "Created archive: ${ARCHIVE_NAME}.zip and parts"
      
      - name: Create downloads directory
        run: |
          ARCHIVE_NAME="${{ steps.zip.outputs.archive_name }}"
          mkdir -p downloads/${ARCHIVE_NAME}
      
      - name: Push ZIP parts incrementally
        run: |
          ARCHIVE_NAME="${{ steps.zip.outputs.archive_name }}"
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Push each part individually to avoid timeout
          for file in ${ARCHIVE_NAME}.zip ${ARCHIVE_NAME}.z*; do
            if [ -f "$file" ]; then
              mv "$file" downloads/${ARCHIVE_NAME}/
              git add downloads/${ARCHIVE_NAME}/$(basename "$file")
              git commit -m "Add part $(basename "$file") for ${ARCHIVE_NAME}"
              git push
              sleep 2
            fi
          done
      
      - name: Create model info and finalize
        run: |
          ARCHIVE_NAME="${{ steps.zip.outputs.archive_name }}"
          
          # Get model details
          MODEL_INFO=$(ollama show ${{ github.event.inputs.model_name }} --modelfile 2>/dev/null || echo "Model details not available")
          
          cat > downloads/${ARCHIVE_NAME}/INFO.txt << EOF
          Ollama Model: ${{ github.event.inputs.model_name }}
          Date: $(date -u '+%Y-%m-%d %H:%M:%S UTC')
          Parts: $(ls downloads/${ARCHIVE_NAME}/*.zip downloads/${ARCHIVE_NAME}/*.z* 2>/dev/null | wc -l)
          Password required for extraction
          
          Model Information:
          $MODEL_INFO
          
          To restore this model:
          1. Extract all zip parts: cat ollama_${MODEL_NAME}_*.z* > combined.zip (or use zip -F)
          2. Unzip with password: unzip -P "password" combined.zip -d ~/.ollama/
          3. Restart Ollama service
          EOF
          
          # Get model size
          MODEL_SIZE=$(du -sh model_data | cut -f1)
          echo "Model Size: $MODEL_SIZE" >> downloads/${ARCHIVE_NAME}/INFO.txt
          
          if [ ! -f README.md ]; then
            echo "# Ollama Models Archive" > README.md
            echo "" >> README.md
            echo "This repository contains password-protected Ollama model archives." >> README.md
            echo "" >> README.md
          fi
          
          echo "## [${{ github.event.inputs.model_name }}]($(date +%Y-%m-%d))" >> README.md
          echo "- Model: ${{ github.event.inputs.model_name }}" >> README.md
          echo "- Size: $MODEL_SIZE" >> README.md
          echo "- Date: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> README.md
          echo "- [Download Archive](downloads/${ARCHIVE_NAME}/)" >> README.md
          echo "" >> README.md
          
          git add downloads/${ARCHIVE_NAME}/INFO.txt README.md
          git commit -m "Finalize ${ARCHIVE_NAME} - Ollama model ${{ github.event.inputs.model_name }}"
          git push
      
      - name: Clean up Ollama models (optional)
        if: always()
        run: |
          # Clean up to free disk space
          ollama rm ${{ github.event.inputs.model_name }} || true
          rm -rf model_data
          rm -rf ${HOME}/.ollama/models
      
      - name: Summary
        run: |
          echo "## ✅ Ollama Model Pull Complete" >> $GITHUB_STEP_SUMMARY
          echo "- Model: ${{ github.event.inputs.model_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- Location: \`downloads/${{ steps.zip.outputs.archive_name }}/\`" >> $GITHUB_STEP_SUMMARY
          echo "- Archive size: $(du -sh downloads/${{ steps.zip.outputs.archive_name }} | cut -f1)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### To restore the model:" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "# Download all parts and combine if needed" >> $GITHUB_STEP_SUMMARY
          echo "# Extract to Ollama models directory" >> $GITHUB_STEP_SUMMARY
          echo "unzip -P \"password\" downloads/${{ steps.zip.outputs.archive_name }}/*.zip -d ~/.ollama/" >> $GITHUB_STEP_SUMMARY
          echo "# Restart Ollama" >> $GITHUB_STEP_SUMMARY
          echo "ollama serve" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
