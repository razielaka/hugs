name: Download HuggingFace Repo (XetHub Compatible)

on:
  workflow_dispatch:
    inputs:
      repo_id:
        description: 'HuggingFace Repository ID (e.g., istupakov/parakeet-tdt-0.6b-v3-onnx)'
        required: true
        default: 'istupakov/parakeet-tdt-0.6b-v3-onnx'
        type: string
      password:
        description: 'ZIP Password'
        required: true
        default: 'your-password-here'
        type: string
      part_size_mb:
        description: 'Part size in MB for splitting (default: 45)'
        required: false
        default: '45'
        type: string

jobs:
  download-and-zip:
    name: "Download HF Repo & Create ZIP Parts"
    runs-on: ubuntu-latest
    timeout-minutes: 300
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y zip curl jq bc git-lfs
          pip3 install huggingface-hub
          # Install hf CLI
          curl -fsSL https://hf.co/download/hf/linux/hf -o /usr/local/bin/hf
          chmod +x /usr/local/bin/hf
      
      - name: Make scripts executable
        run: |
          mkdir -p scripts
          chmod +x scripts/*.sh 2>/dev/null || true
      
      - name: Download repository using hf CLI
        id: download
        run: |
          bash scripts/download_hf_repo.sh "${{ github.event.inputs.repo_id }}"
      
      - name: Check if download was successful
        id: check
        run: |
          if [ ! -d "downloaded_repo" ] || [ -z "$(ls -A downloaded_repo)" ]; then
            echo "❌ Download failed - no files found"
            echo "Trying alternative method..."
            
            # Alternative: Use git clone with LFS
            REPO_ID="${{ github.event.inputs.repo_id }}"
            git clone https://huggingface.co/${REPO_ID} downloaded_repo
            cd downloaded_repo
            git lfs pull
            cd ..
            
            # Remove .git directory
            rm -rf downloaded_repo/.git
          fi
          
          echo "Files in downloaded_repo:"
          ls -la downloaded_repo/
          echo ""
          echo "File sizes:"
          find downloaded_repo -type f -exec du -sh {} \; 2>/dev/null || echo "No files found"
      
      - name: Get repository size and file info
        id: size
        run: |
          if [ ! -d "downloaded_repo" ] || [ -z "$(ls -A downloaded_repo)" ]; then
            echo "total_size=0" >> $GITHUB_OUTPUT
            echo "total_size_mb=0" >> $GITHUB_OUTPUT
            echo "file_count=0" >> $GITHUB_OUTPUT
            exit 1
          fi
          
          TOTAL_SIZE=$(du -sb downloaded_repo | cut -f1)
          TOTAL_SIZE_MB=$(echo "scale=2; $TOTAL_SIZE / 1024 / 1024" | bc)
          echo "total_size=$TOTAL_SIZE" >> $GITHUB_OUTPUT
          echo "total_size_mb=$TOTAL_SIZE_MB" >> $GITHUB_OUTPUT
          
          FILE_COUNT=$(find downloaded_repo -type f | wc -l)
          echo "file_count=$FILE_COUNT" >> $GITHUB_OUTPUT
          echo "Total size: ${TOTAL_SIZE_MB} MB, Files: $FILE_COUNT"
      
      - name: Create password-protected ZIP with parts
        id: create-zip
        if: steps.size.outputs.file_count != '0'
        run: |
          REPO_NAME=$(basename "${{ github.event.inputs.repo_id }}")
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          ARCHIVE_NAME="${REPO_NAME}_${TIMESTAMP}"
          
          echo "Creating ZIP archive with ${{ github.event.inputs.part_size_mb }}MB parts"
          echo "Archive name: $ARCHIVE_NAME"
          
          cd downloaded_repo
          zip -r -s ${{ github.event.inputs.part_size_mb }}m -P "${{ github.event.inputs.password }}" \
            "../${ARCHIVE_NAME}.zip" . || echo "Warning: ZIP creation had issues"
          cd ..
          
          if [ -f "${ARCHIVE_NAME}.zip" ]; then
            PART_COUNT=$(ls ${ARCHIVE_NAME}.zip ${ARCHIVE_NAME}.z* 2>/dev/null | wc -l)
            echo "part_count=$PART_COUNT" >> $GITHUB_OUTPUT
            echo "archive_name=$ARCHIVE_NAME" >> $GITHUB_OUTPUT
            echo "Total parts: $PART_COUNT"
          else
            echo "No ZIP file created"
            exit 1
          fi
      
      - name: Generate README with instructions
        if: steps.create-zip.outputs.archive_name != ''
        run: |
          bash scripts/create_readme.sh \
            "${{ steps.create-zip.outputs.archive_name }}" \
            "${{ github.event.inputs.repo_id }}" \
            "${{ steps.size.outputs.total_size_mb }}" \
            "${{ steps.size.outputs.file_count }}" \
            "${{ steps.create-zip.outputs.part_count }}" \
            "${{ github.event.inputs.part_size_mb }}" \
            "${{ github.event.inputs.password }}"
      
      - name: Upload ZIP parts as artifacts
        if: steps.create-zip.outputs.archive_name != ''
        uses: actions/upload-artifact@v4
        with:
          name: "${{ steps.create-zip.outputs.archive_name }}_parts"
          path: |
            ${{ steps.create-zip.outputs.archive_name }}.zip
            ${{ steps.create-zip.outputs.archive_name }}.z*
            README_${{ steps.create-zip.outputs.archive_name }}.md
          compression-level: 0
          retention-days: 90
      
      - name: Create GitHub Release (Optional)
        if: github.ref == 'refs/heads/main' && steps.create-zip.outputs.archive_name != ''
        run: |
          bash scripts/create_release_notes.sh \
            "${{ steps.create-zip.outputs.archive_name }}" \
            "${{ github.event.inputs.repo_id }}" \
            "${{ steps.size.outputs.total_size_mb }}" \
            "${{ steps.create-zip.outputs.part_count }}" \
            "${{ github.event.inputs.password }}"
          
          gh release create "v-${{ steps.create-zip.outputs.archive_name }}" \
            --title "📦 $(basename "${{ github.event.inputs.repo_id }}") - HF Repository Archive" \
            --notes-file release_notes.md \
            ${{ steps.create-zip.outputs.archive_name }}.zip \
            ${{ steps.create-zip.outputs.archive_name }}.z* \
            "README_${{ steps.create-zip.outputs.archive_name }}.md" 2>/dev/null || echo "Release may already exist"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Summary
        if: always()
        run: |
          if [ "${{ steps.size.outputs.file_count }}" == "0" ]; then
            echo "## ❌ Download Failed!" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "No files were downloaded. The repository might be private or inaccessible." >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
          
          echo "## ✅ Download Complete!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Repository** | ${{ github.event.inputs.repo_id }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Archive** | \`${{ steps.create-zip.outputs.archive_name }}.zip\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Total Size** | ${{ steps.size.outputs.total_size_mb }} MB |" >> $GITHUB_STEP_SUMMARY
          echo "| **Files** | ${{ steps.size.outputs.file_count }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Parts** | ${{ steps.create-zip.outputs.part_count }} parts |" >> $GITHUB_STEP_SUMMARY
          echo "| **Password** | \`${{ github.event.inputs.password }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📥 Download Location" >> $GITHUB_STEP_SUMMARY
          echo "The ZIP parts are available in the **Artifacts** section of this workflow run." >> $GITHUB_STEP_SUMMARY
