name: Download HuggingFace Repo

on:
  workflow_dispatch:
    inputs:
      repo_id:
        description: 'HuggingFace Repository ID'
        required: true
        default: 'istupakov/parakeet-tdt-0.6b-v3-onnx'
        type: string
      password:
        description: 'ZIP Password'
        required: true
        type: string
      part_size_mb:
        description: 'Part size in MB'
        required: false
        default: '45'
        type: string

jobs:
  download-and-zip:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y zip git-lfs bc
          pip3 install huggingface-hub
      
      - name: Download with Python script
        run: |
          cat > download_hf.py << 'PYTHON_SCRIPT'
          import os
          import sys
          from huggingface_hub import snapshot_download
          
          repo_id = sys.argv[1]
          print(f"Downloading: {repo_id}")
          
          try:
              snapshot_download(
                  repo_id=repo_id,
                  local_dir="./downloaded_repo",
                  local_dir_use_symlinks=False,
                  resume_download=True,
                  ignore_patterns=[".git", ".gitattributes", ".gitignore", ".hf"]
              )
              print("Download successful")
          except Exception as e:
              print(f"Error: {e}")
              sys.exit(1)
          PYTHON_SCRIPT
          
          python3 download_hf.py "${{ github.event.inputs.repo_id }}"
      
      - name: Clean up git files
        run: |
          rm -rf downloaded_repo/.git 2>/dev/null || true
          rm -f downloaded_repo/.gitattributes 2>/dev/null || true
          rm -f downloaded_repo/.gitignore 2>/dev/null || true
          rm -rf downloaded_repo/.hf 2>/dev/null || true
          echo "Files downloaded:"
          find downloaded_repo -type f | head -20
      
      - name: Get repository info
        id: info
        run: |
          FILE_COUNT=$(find downloaded_repo -type f | wc -l)
          TOTAL_SIZE=$(du -sb downloaded_repo | cut -f1)
          TOTAL_SIZE_MB=$(echo "scale=2; $TOTAL_SIZE / 1024 / 1024" | bc)
          
          echo "file_count=$FILE_COUNT" >> $GITHUB_OUTPUT
          echo "total_size_mb=$TOTAL_SIZE_MB" >> $GITHUB_OUTPUT
          echo "Total size: ${TOTAL_SIZE_MB} MB, Files: $FILE_COUNT"
      
      - name: Create ZIP archive
        id: zip
        run: |
          REPO_NAME=$(basename "${{ github.event.inputs.repo_id }}")
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          ARCHIVE_NAME="${REPO_NAME}_${TIMESTAMP}"
          
          cd downloaded_repo
          zip -r -s ${{ github.event.inputs.part_size_mb }}m \
            -P "${{ github.event.inputs.password }}" \
            "../${ARCHIVE_NAME}.zip" .
          cd ..
          
          PART_COUNT=$(ls ${ARCHIVE_NAME}.zip ${ARCHIVE_NAME}.z* 2>/dev/null | wc -l)
          echo "archive_name=$ARCHIVE_NAME" >> $GITHUB_OUTPUT
          echo "part_count=$PART_COUNT" >> $GITHUB_OUTPUT
      
      - name: Create README
        run: |
          ARCHIVE_NAME="${{ steps.zip.outputs.archive_name }}"
          REPO_NAME=$(basename "${{ github.event.inputs.repo_id }}")
          
          echo "# ${REPO_NAME} - HuggingFace Repository Archive" > README_${ARCHIVE_NAME}.md
          echo "" >> README_${ARCHIVE_NAME}.md
          echo "## Download Information" >> README_${ARCHIVE_NAME}.md
          echo "- Original Repository: ${{ github.event.inputs.repo_id }}" >> README_${ARCHIVE_NAME}.md
          echo "- Archive Name: \`${ARCHIVE_NAME}.zip\`" >> README_${ARCHIVE_NAME}.md
          echo "- Total Size: ${{ steps.info.outputs.total_size_mb }} MB" >> README_${ARCHIVE_NAME}.md
          echo "- Files: ${{ steps.info.outputs.file_count }}" >> README_${ARCHIVE_NAME}.md
          echo "- Parts: ${{ steps.zip.outputs.part_count }} parts (${{ github.event.inputs.part_size_mb }}MB each)" >> README_${ARCHIVE_NAME}.md
          echo "- Password Protected: YES" >> README_${ARCHIVE_NAME}.md
          echo "" >> README_${ARCHIVE_NAME}.md
          echo "## Password" >> README_${ARCHIVE_NAME}.md
          echo "\`\`\`" >> README_${ARCHIVE_NAME}.md
          echo "${{ github.event.inputs.password }}" >> README_${ARCHIVE_NAME}.md
          echo "\`\`\`" >> README_${ARCHIVE_NAME}.md
          echo "" >> README_${ARCHIVE_NAME}.md
          echo "## How to Extract" >> README_${ARCHIVE_NAME}.md
          echo "" >> README_${ARCHIVE_NAME}.md
          echo "1. Download all parts (.zip, .z01, .z02, etc.)" >> README_${ARCHIVE_NAME}.md
          echo "2. Place them in the same folder" >> README_${ARCHIVE_NAME}.md
          echo "3. Extract with password using 7-Zip or WinRAR" >> README_${ARCHIVE_NAME}.md
          echo "" >> README_${ARCHIVE_NAME}.md
          echo "### Linux/Mac Command Line:" >> README_${ARCHIVE_NAME}.md
          echo "\`\`\`bash" >> README_${ARCHIVE_NAME}.md
          echo "unzip -P \"${{ github.event.inputs.password }}\" ${ARCHIVE_NAME}.zip" >> README_${ARCHIVE_NAME}.md
          echo "\`\`\`" >> README_${ARCHIVE_NAME}.md
          echo "" >> README_${ARCHIVE_NAME}.md
          echo "---" >> README_${ARCHIVE_NAME}.md
          echo "*Archived on: $(date '+%Y-%m-%d %H:%M:%S UTC')*" >> README_${ARCHIVE_NAME}.md
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: "${{ steps.zip.outputs.archive_name }}_parts"
          path: |
            ${{ steps.zip.outputs.archive_name }}.zip
            ${{ steps.zip.outputs.archive_name }}.z*
            README_${{ steps.zip.outputs.archive_name }}.md
          compression-level: 0
          retention-days: 90
      
      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main'
        run: |
          ARCHIVE_NAME="${{ steps.zip.outputs.archive_name }}"
          REPO_NAME=$(basename "${{ github.event.inputs.repo_id }}")
          
          echo "# ${{ github.event.inputs.repo_id }}" > release_notes.md
          echo "" >> release_notes.md
          echo "## Download Information" >> release_notes.md
          echo "- Total Size: ${{ steps.info.outputs.total_size_mb }} MB" >> release_notes.md
          echo "- Parts: ${{ steps.zip.outputs.part_count }} parts" >> release_notes.md
          echo "- Password: \`${{ github.event.inputs.password }}\`" >> release_notes.md
          echo "" >> release_notes.md
          echo "## Instructions" >> release_notes.md
          echo "1. Download all ZIP parts from assets below" >> release_notes.md
          echo "2. Extract with password using any zip tool" >> release_notes.md
          
          gh release create "v-${ARCHIVE_NAME}" \
            --title "📦 ${REPO_NAME}" \
            --notes-file release_notes.md \
            ${ARCHIVE_NAME}.zip ${ARCHIVE_NAME}.z* \
            "README_${ARCHIVE_NAME}.md" || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Summary
        run: |
          echo "## ✅ Download Complete" >> $GITHUB_STEP_SUMMARY
          echo "- Repository: ${{ github.event.inputs.repo_id }}" >> $GITHUB_STEP_SUMMARY
          echo "- Size: ${{ steps.info.outputs.total_size_mb }} MB" >> $GITHUB_STEP_SUMMARY
          echo "- Files: ${{ steps.info.outputs.file_count }}" >> $GITHUB_STEP_SUMMARY
          echo "- Parts: ${{ steps.zip.outputs.part_count }}" >> $GITHUB_STEP_SUMMARY
          echo "- Password: \`${{ github.event.inputs.password }}\`" >> $GITHUB_STEP_SUMMARY
