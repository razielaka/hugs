name: Download HuggingFace Repo

on:
  workflow_dispatch:
    inputs:
      repo_id:
        description: 'HuggingFace Repository ID'
        required: true
        default: 'istupakov/parakeet-tdt-0.6b-v3-onnx'
        type: string
      password:
        description: 'ZIP Password'
        required: true
        type: string
      part_size_mb:
        description: 'Part size in MB'
        required: false
        default: '45'
        type: string

jobs:
  download-and-zip:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y zip git-lfs bc
          pip3 install huggingface-hub
      
      - name: Download with Python script
        run: |
          cat > download_hf.py << 'PYTHON_SCRIPT'
          import os
          import sys
          from huggingface_hub import snapshot_download
          
          repo_id = sys.argv[1]
          print(f"Downloading: {repo_id}")
          
          try:
              snapshot_download(
                  repo_id=repo_id,
                  local_dir="./downloaded_repo",
                  local_dir_use_symlinks=False,
                  resume_download=True,
                  ignore_patterns=[".git", ".gitattributes", ".gitignore", ".hf"]
              )
              print("Download successful")
          except Exception as e:
              print(f"Error: {e}")
              sys.exit(1)
          PYTHON_SCRIPT
          
          python3 download_hf.py "${{ github.event.inputs.repo_id }}"
      
      - name: Clean up git files
        run: |
          rm -rf downloaded_repo/.git 2>/dev/null || true
          rm -f downloaded_repo/.gitattributes 2>/dev/null || true
          rm -f downloaded_repo/.gitignore 2>/dev/null || true
          rm -rf downloaded_repo/.hf 2>/dev/null || true
      
      - name: Create ZIP archive
        id: zip
        run: |
          REPO_NAME=$(basename "${{ github.event.inputs.repo_id }}")
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          ARCHIVE_NAME="${REPO_NAME}_${TIMESTAMP}"
          
          cd downloaded_repo
          zip -r -s ${{ github.event.inputs.part_size_mb }}m \
            -P "${{ github.event.inputs.password }}" \
            "../${ARCHIVE_NAME}.zip" .
          cd ..
          
          echo "archive_name=$ARCHIVE_NAME" >> $GITHUB_OUTPUT
      
      - name: Create downloads directory
        run: |
          ARCHIVE_NAME="${{ steps.zip.outputs.archive_name }}"
          mkdir -p downloads/${ARCHIVE_NAME}
      
      - name: Push ZIP parts incrementally
        run: |
          ARCHIVE_NAME="${{ steps.zip.outputs.archive_name }}"
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Push each part individually to avoid timeout
          for file in ${ARCHIVE_NAME}.zip ${ARCHIVE_NAME}.z*; do
            if [ -f "$file" ]; then
              mv "$file" downloads/${ARCHIVE_NAME}/
              git add downloads/${ARCHIVE_NAME}/$(basename "$file")
              git commit -m "Add part $(basename "$file") for ${ARCHIVE_NAME}"
              git push
              sleep 2
            fi
          done
      
      - name: Create README and finalize
        run: |
          ARCHIVE_NAME="${{ steps.zip.outputs.archive_name }}"
          
          cat > downloads/${ARCHIVE_NAME}/INFO.txt << EOF
          Repository: ${{ github.event.inputs.repo_id }}
          Date: $(date -u '+%Y-%m-%d %H:%M:%S UTC')
          Parts: $(ls downloads/${ARCHIVE_NAME}/*.zip downloads/${ARCHIVE_NAME}/*.z* 2>/dev/null | wc -l)
          Password required for extraction
          EOF
          
          if [ ! -f README.md ]; then
            echo "# Downloaded Repositories" > README.md
            echo "" >> README.md
          fi
          
          echo "- [${{ github.event.inputs.repo_id }}](downloads/${ARCHIVE_NAME}/)" >> README.md
          
          git add downloads/${ARCHIVE_NAME}/INFO.txt README.md
          git commit -m "Finalize ${ARCHIVE_NAME}"
          git push
      
      - name: Summary
        run: |
          echo "## ✅ Download Complete" >> $GITHUB_STEP_SUMMARY
          echo "- Repository: ${{ github.event.inputs.repo_id }}" >> $GITHUB_STEP_SUMMARY
          echo "- Location: \`downloads/${{ steps.zip.outputs.archive_name }}/\`" >> $GITHUB_STEP_SUMMARY
