name: Download HuggingFace Repo (XetHub Compatible)

on:
  workflow_dispatch:
    inputs:
      repo_id:
        description: 'HuggingFace Repository ID (e.g., istupakov/parakeet-tdt-0.6b-v3-onnx)'
        required: true
        default: 'istupakov/parakeet-tdt-0.6b-v3-onnx'
        type: string
      password:
        description: 'ZIP Password'
        required: true
        default: 'your-password-here'
        type: string
      part_size_mb:
        description: 'Part size in MB for splitting (default: 45)'
        required: false
        default: '45'
        type: string

jobs:
  download-and-zip:
    name: "Download HF Repo & Create ZIP Parts"
    runs-on: ubuntu-latest
    timeout-minutes: 300
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y zip curl jq python3-pip
          pip3 install huggingface-hub
      
      - name: Download repository using huggingface-hub
        run: |
          REPO_ID="${{ github.event.inputs.repo_id }}"
          echo "Downloading: $REPO_ID"
          
          # Create download directory
          mkdir -p downloaded_repo
          
          # Use huggingface-cli to download all files (handles XetHub properly)
          huggingface-cli download \
            "$REPO_ID" \
            --local-dir ./downloaded_repo \
            --local-dir-use-symlinks False \
            --resume-download \
            --quiet
          
          echo "Download complete. Contents:"
          ls -la downloaded_repo/
          echo ""
          echo "File sizes:"
          du -sh downloaded_repo/* 2>/dev/null || echo "No files found"
      
      - name: Remove .git and .gitattributes
        run: |
          # Remove any Git-related files and directories
          rm -rf downloaded_repo/.git 2>/dev/null || true
          rm -f downloaded_repo/.gitattributes 2>/dev/null || true
          rm -f downloaded_repo/.gitignore 2>/dev/null || true
          
          echo "Cleaned directory:"
          ls -la downloaded_repo/
      
      - name: Get repository size
        id: size
        run: |
          TOTAL_SIZE=$(du -sb downloaded_repo | cut -f1)
          TOTAL_SIZE_MB=$(echo "scale=2; $TOTAL_SIZE / 1024 / 1024" | bc)
          echo "total_size=$TOTAL_SIZE" >> $GITHUB_OUTPUT
          echo "total_size_mb=$TOTAL_SIZE_MB" >> $GITHUB_OUTPUT
          echo "Total size: ${TOTAL_SIZE_MB} MB"
          
          # Count files
          FILE_COUNT=$(find downloaded_repo -type f | wc -l)
          echo "file_count=$FILE_COUNT" >> $GITHUB_OUTPUT
          echo "Number of files: $FILE_COUNT"
      
      - name: Create password-protected ZIP with parts
        run: |
          REPO_NAME=$(basename "${{ github.event.inputs.repo_id }}")
          PASSWORD="${{ github.event.inputs.password }}"
          PART_SIZE="${{ github.event.inputs.part_size_mb }}"
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          ARCHIVE_NAME="${REPO_NAME}_${TIMESTAMP}"
          
          echo "Creating ZIP archive with ${PART_SIZE}MB parts"
          echo "Archive name: $ARCHIVE_NAME"
          echo "Password protection: ENABLED"
          
          # Create ZIP with splitting and password
          cd downloaded_repo
          zip -r -s ${PART_SIZE}m -P "$PASSWORD" \
            "../${ARCHIVE_NAME}.zip" \
            .
          cd ..
          
          # List created parts
          echo ""
          echo "Created ZIP parts:"
          ls -lh ${ARCHIVE_NAME}.zip ${ARCHIVE_NAME}.z* 2>/dev/null | head -20
          
          # Count parts
          PART_COUNT=$(ls ${ARCHIVE_NAME}.zip ${ARCHIVE_NAME}.z* 2>/dev/null | wc -l)
          echo "part_count=$PART_COUNT" >> $GITHUB_OUTPUT
          echo "archive_name=$ARCHIVE_NAME" >> $GITHUB_OUTPUT
          echo "Total parts: $PART_COUNT"
      
      - name: Generate README with instructions
        run: |
          ARCHIVE_NAME="${{ steps.create-zip.outputs.archive_name }}"
          if [ -z "$ARCHIVE_NAME" ]; then
            REPO_NAME=$(basename "${{ github.event.inputs.repo_id }}")
            TIMESTAMP=$(date +%Y%m%d_%H%M%S)
            ARCHIVE_NAME="${REPO_NAME}_${TIMESTAMP}"
          fi
          
          PASSWORD="${{ github.event.inputs.password }}"
          PART_SIZE="${{ github.event.inputs.part_size_mb }}"
          TOTAL_SIZE_MB="${{ steps.size.outputs.total_size_mb }}"
          FILE_COUNT="${{ steps.size.outputs.file_count }}"
          PART_COUNT="${{ steps.create-zip.outputs.part_count }}"
          
          cat > "README_${ARCHIVE_NAME}.md" << 'EOF'
    			# ${REPO_NAME} - HuggingFace Repository Archive
    
    			## Download Information
    			- **Original Repository**: ${{ github.event.inputs.repo_id }}
    			- **Archive Name**: `${ARCHIVE_NAME}.zip`
    			- **Total Size**: ${TOTAL_SIZE_MB} MB
    			- **Files**: ${FILE_COUNT} files
    			- **Parts**: ${PART_COUNT} parts (${PART_SIZE}MB each)
    			- **Password Protected**: **YES**
    
    			## Password
    			```
    			${PASSWORD}
    			```
    
    			## How to Extract
    
    			### Windows (7-Zip/WinRAR):
    			1. Download **all** parts (`.zip`, `.z01`, `.z02`, etc.)
    			2. Put them in the **same folder**
    			3. Right-click on `${ARCHIVE_NAME}.zip`
    			4. Select "Extract Here" or "Extract to folder"
    			5. Enter password: `${PASSWORD}`
    
    			### Linux/Mac:
    			```bash
    			# Download all parts to same directory, then:
    			zip -P "${PASSWORD}" ${ARCHIVE_NAME}.zip -d extracted_files/
    
    			# Or using 7zip:
    			7z x ${ARCHIVE_NAME}.zip -p"${PASSWORD}"
    			```
    
    			### Python:
    			```python
    			import zipfile
    			with zipfile.ZipFile('${ARCHIVE_NAME}.zip', 'r') as zip_ref:
    				zip_ref.extractall('.', pwd=b'${PASSWORD}')
    			```
    
    			## File List
    			$(cd downloaded_repo && find . -type f | head -50 | sed 's/^/- /')
    
    			---
    			*Archived on: $(date '+%Y-%m-%d %H:%M:%S UTC')*
    			*Original source: https://huggingface.co/${{ github.event.inputs.repo_id }}*
    			EOF
          
          # Substitute variables
          sed -i "s/\${REPO_NAME}/$(basename "${{ github.event.inputs.repo_id }}")/g" "README_${ARCHIVE_NAME}.md"
          sed -i "s/\${ARCHIVE_NAME}/${ARCHIVE_NAME}/g" "README_${ARCHIVE_NAME}.md"
          sed -i "s/\${TOTAL_SIZE_MB}/${TOTAL_SIZE_MB}/g" "README_${ARCHIVE_NAME}.md"
          sed -i "s/\${FILE_COUNT}/${FILE_COUNT}/g" "README_${ARCHIVE_NAME}.md"
          sed -i "s/\${PART_COUNT}/${PART_COUNT}/g" "README_${ARCHIVE_NAME}.md"
          sed -i "s/\${PART_SIZE}/${PART_SIZE}/g" "README_${ARCHIVE_NAME}.md"
          sed -i "s/\${PASSWORD}/${PASSWORD}/g" "README_${ARCHIVE_NAME}.md"
          
          echo "README_${ARCHIVE_NAME}.md created"
      
      - name: Upload ZIP parts as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: "${{ steps.create-zip.outputs.archive_name }}_parts"
          path: |
            ${{ steps.create-zip.outputs.archive_name }}.zip
            ${{ steps.create-zip.outputs.archive_name }}.z*
            README_${{ steps.create-zip.outputs.archive_name }}.md
          compression-level: 0
          retention-days: 90
      
      - name: Create GitHub Release (Optional)
        if: github.ref == 'refs/heads/main'
        run: |
          ARCHIVE_NAME="${{ steps.create-zip.outputs.archive_name }}"
          if [ -z "$ARCHIVE_NAME" ]; then
            REPO_NAME=$(basename "${{ github.event.inputs.repo_id }}")
            TIMESTAMP=$(date +%Y%m%d_%H%M%S)
            ARCHIVE_NAME="${REPO_NAME}_${TIMESTAMP}"
          fi
          
          PASSWORD="${{ github.event.inputs.password }}"
          TOTAL_SIZE_MB="${{ steps.size.outputs.total_size_mb }}"
          PART_COUNT="${{ steps.create-zip.outputs.part_count }}"
          
          # Create release notes
          cat > release_notes.md << EOF
			## 📦 Repository Archive

			- **Repository**: ${{ github.event.inputs.repo_id }}
			- **Total Size**: ${TOTAL_SIZE_MB} MB
			- **Parts**: ${PART_COUNT} parts (45MB each)
			- **Password Protected**: YES

			### 🔐 Password
			\`\`\`
			${PASSWORD}
			\`\`\`

			### 📥 Download
			Download **all** ZIP parts from the Assets section below, then extract using the password above.

			### 🔧 Extraction Instructions
			1. Download all files: \`${ARCHIVE_NAME}.zip\`, \`${ARCHIVE_NAME}.z01\`, etc.
			2. Place them in the same folder
			3. Extract \`${ARCHIVE_NAME}.zip\` with any zip tool (7-Zip, WinRAR, etc.)
			4. Enter the password when prompted

			---
			*Generated by GitHub Actions on $(date '+%Y-%m-%d %H:%M:%S UTC')*
			EOF
          
          # Create release and upload assets
          gh release create "v-${ARCHIVE_NAME}" \
            --title "📦 ${REPO_NAME} - HF Repository Archive" \
            --notes-file release_notes.md \
            ${ARCHIVE_NAME}.zip ${ARCHIVE_NAME}.z* \
            "README_${ARCHIVE_NAME}.md"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Summary
        run: |
          ARCHIVE_NAME="${{ steps.create-zip.outputs.archive_name }}"
          if [ -z "$ARCHIVE_NAME" ]; then
            REPO_NAME=$(basename "${{ github.event.inputs.repo_id }}")
            TIMESTAMP=$(date +%Y%m%d_%H%M%S)
            ARCHIVE_NAME="${REPO_NAME}_${TIMESTAMP}"
          fi
          
          PART_COUNT="${{ steps.create-zip.outputs.part_count }}"
          TOTAL_SIZE_MB="${{ steps.size.outputs.total_size_mb }}"
          FILE_COUNT="${{ steps.size.outputs.file_count }}"
          
          echo "## ✅ Download Complete!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Repository** | ${{ github.event.inputs.repo_id }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Archive** | \`${ARCHIVE_NAME}.zip\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Total Size** | ${TOTAL_SIZE_MB} MB |" >> $GITHUB_STEP_SUMMARY
          echo "| **Files** | ${FILE_COUNT} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Parts** | ${PART_COUNT} parts |" >> $GITHUB_STEP_SUMMARY
          echo "| **Password** | \`${{ github.event.inputs.password }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📥 Download Location" >> $GITHUB_STEP_SUMMARY
          echo "The ZIP parts are available in the **Artifacts** section of this workflow run." >> $GITHUB_STEP_SUMMARY
